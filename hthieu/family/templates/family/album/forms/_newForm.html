<div id="create-album-form">
    <form class="form-horizontal" method="post">{% csrf_token %}
        {% for field in form %}
            {% if field.is_hidden %}<div>{{ field }}</div>{% endif %}
        {% endfor %}

        <div class="well control-group {% if form.name.errors %}error{% endif %}">
            <div class="input-prepend">
                {{ form.name }}
                <input class="btn" type="submit" name="post" value="Add album" />
            </div>
            <span class="help-inline">{{ form.name.errors }}</span>
        </div>

        <div><input type="hidden" name="action" value="create_album"></div>
    </form>
</div>
